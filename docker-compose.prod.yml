services:
  postgres:
    environment:
      POSTGRES_DB: colonel_saas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d colonel_saas"]

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_NAME: colonel_saas
      REDIS_DATABASE: 0
      TALENT_ENRICH_MODE: real
      TALENT_PUBLIC_PAGE_CRAWL_ENABLED: "false"
    ports:
      - "8080:8080"

  frontend:
    environment:
      VITE_ENV_LABEL: PROD(REAL)

