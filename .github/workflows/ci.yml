name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - release/real-pre
  merge_group:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DB_PASSWORD: ci-test-placeholder
      REDIS_PASSWORD: ci-test-placeholder
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile backend
        run: mvn -B -DskipTests compile

      - name: Run migration and Schema contract tests
        run: >-
          mvn -B
          "-Dtest=RoleAwareAttributionSchemaContractTest,RoleAwareAttributionFlywayIntegrationTest,CoreEntityDatabaseSchemaContractTest,ColonelsettlementOrderMapperSchemaIntegrationTest,ColonelsettlementOrderMapperDualDimensionContractTest,RealPreMigrationContractTest"
          test

      - name: Start isolated PostgreSQL and Redis
        working-directory: .
        run: docker compose --project-name saas-ci-test --file docker-compose.test.yml up -d --wait postgres redis

      - name: Run backend unit, architecture and integration tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_NAME: colonel_saas_test
          DB_USER: saas
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: "6379"
          REDIS_DATABASE: "1"
        run: mvn -B test

      - name: Capture dependency diagnostics
        if: failure()
        working-directory: .
        run: |
          docker compose --project-name saas-ci-test --file docker-compose.test.yml ps --all
          docker compose --project-name saas-ci-test --file docker-compose.test.yml logs --no-color --tail=300 postgres redis

      - name: Stop isolated test dependencies
        if: always()
        working-directory: .
        run: docker compose --project-name saas-ci-test --file docker-compose.test.yml down --remove-orphans

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build

  governance:
    name: Repository governance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check changed lines for whitespace errors
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          else
            git show --check --format= HEAD
          fi

      - name: Install pinned Pester
        shell: pwsh
        run: Install-Module Pester -RequiredVersion 4.10.1 -Scope CurrentUser -Force

      - name: Check GitHub collaboration contract
        shell: pwsh
        run: |
          $tests = @(
            './harness/scripts/tests/github-collaboration.Tests.ps1',
            './harness/scripts/tests/safety-check-docs.Tests.ps1',
            './harness/scripts/tests/git-push-safe.Tests.ps1',
            './harness/scripts/tests/agent-do-conclusion.Tests.ps1',
            './harness/scripts/tests/check-harness-limits.Tests.ps1'
          )
          $result = Invoke-Pester -Script $tests -PassThru
          if ($result.FailedCount -gt 0) { throw "GitHub collaboration contract failed." }

      - name: Validate real-pre Compose configuration
        shell: bash
        run: |
          cp -f .env.real-pre.example /tmp/.env.real-pre
          ln -sf /tmp/.env.real-pre .env.real-pre
          full_sha=0000000000000000000000000000000000000000
          IMAGE_TAG="$full_sha" docker compose --env-file /tmp/.env.real-pre -f docker-compose.real-pre.yml config > /tmp/compose.yml
          grep -q "colonel-saas/backend:$full_sha" /tmp/compose.yml
          grep -q "colonel-saas/frontend:$full_sha" /tmp/compose.yml
          rm -f .env.real-pre

      - name: Validate migration, backup and Schema precheck scripts
        shell: bash
        run: |
          bash -n scripts/backup-db.sh
          sh -n scripts/run-real-pre-db-migrations.sh
          sh -n scripts/check-real-pre-schema.sh

      - name: Check Harness limits
        shell: pwsh
        run: ./harness/scripts/check-harness-limits.ps1 -BaselineRef HEAD -NoReport

      - name: Check Jenkins release identity and retired SSH deploy path
        shell: pwsh
        run: |
          $jenkins = Get-Content -Raw Jenkinsfile
          $retired = Get-Content -Raw harness/scripts/commands/deploy-remote.ps1
          if ($jenkins -notmatch "defaultValue:\s*'release/real-pre'") { throw 'Jenkins must only deploy release/real-pre' }
          if ($jenkins -notmatch 'IMAGE_TAG must be the full 40-character commit SHA') { throw 'Jenkins must reject floating image tags' }
          if ($jenkins -notmatch "lock\(resource:\s*'saas-real-pre-deploy'") { throw 'Jenkins must hold the global real-pre lock' }
          if ($retired -notmatch 'Direct SSH deployment is retired') { throw 'direct SSH deploy path must remain retired' }

      - name: Reject generated workspace changes
        shell: bash
        run: test -z "$(git status --porcelain)"
