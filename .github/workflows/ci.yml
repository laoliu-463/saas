name: CI

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "harness/reports/**"
  pull_request:
    branches:
      - "**"
    paths-ignore:
      - "harness/reports/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend compile and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile backend
        run: mvn -B -DskipTests compile

      - name: Run migration and Schema contract tests
        run: >-
          mvn -B
          "-Dtest=RoleAwareAttributionSchemaContractTest,RoleAwareAttributionFlywayIntegrationTest,CoreEntityDatabaseSchemaContractTest,ColonelsettlementOrderMapperSchemaIntegrationTest,ColonelsettlementOrderMapperDualDimensionContractTest,RealPreMigrationContractTest"
          test

      - name: Run backend unit, architecture and integration tests
        run: mvn -B test

  governance:
    name: Repository and deployment gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject dirty checkout
        shell: bash
        run: |
          test -z "$(git status --porcelain)"

      - name: Check diff whitespace
        run: git diff --check

      - name: Validate real-pre Compose configuration
        shell: bash
        run: |
          # docker-compose.real-pre.yml hardcodes env_file: .env.real-pre
          # inside the YAML anchor. docker compose config requires that exact
          # working-tree path to exist regardless of --env-file, so symlink
          # the example into the working tree before validation and remove
          # it afterwards to keep the tree clean for downstream steps.
          cp -f .env.real-pre.example /tmp/.env.real-pre
          ln -sf /tmp/.env.real-pre .env.real-pre
          full_sha=0000000000000000000000000000000000000000
          IMAGE_TAG="$full_sha" docker compose --env-file /tmp/.env.real-pre -f docker-compose.real-pre.yml config > /tmp/compose.yml
          grep -q "colonel-saas/backend:$full_sha" /tmp/compose.yml
          grep -q "colonel-saas/frontend:$full_sha" /tmp/compose.yml
          rm -f .env.real-pre

      - name: Validate migration, backup and Schema precheck scripts
        shell: bash
        run: |
          bash -n scripts/backup-db.sh
          sh -n scripts/run-real-pre-db-migrations.sh
          sh -n scripts/check-real-pre-schema.sh

      - name: Check Harness limits
        shell: pwsh
        run: ./harness/scripts/check-harness-limits.ps1 -BaselineRef HEAD -NoReport

      - name: Check deploy script rejects floating image tags
        shell: pwsh
        run: |
          $script = Get-Content -Raw harness/scripts/commands/deploy-remote.ps1
          if ($script -notmatch 'IMAGE_TAG') { throw 'deploy script must validate IMAGE_TAG' }
          if ($script -notmatch '40') { throw 'deploy script must require a full commit SHA image tag' }

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build
