name: CI
on:
  pull_request:
    branches:
      - main
      - release/real-pre
  merge_group:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
# NOTE:
#   - PR / merge_group  / workflow_dispatch run the full suite gated by
#     the changes matrix + ci-gate.
#   - push:main triggers the post-merge verification + image build.
#   - Push to any other branch does NOT trigger a CI run; the PR CI
#     is the single source of truth for task-branch changes.
#   - The changes job computes which downstream jobs MUST run.
#   - The ci-gate job is the single required check for branch
#     protection; it succeeds only if every required downstream job
#     succeeded.
permissions:
  contents: read
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  # ------------------------------------------------------------------
  # changes: compute which downstream jobs are required.
  # ------------------------------------------------------------------
  changes:
    name: Compute change scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend:    ${{ steps.compute.outputs.backend }}
      frontend:   ${{ steps.compute.outputs.frontend }}
      database:   ${{ steps.compute.outputs.database }}
      harness:    ${{ steps.compute.outputs.harness }}
      deployment: ${{ steps.compute.outputs.deployment }}
      docs:       ${{ steps.compute.outputs.docs }}
      other:      ${{ steps.compute.outputs.other }}
      run_governance: ${{ steps.compute.outputs.run_governance }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Compute change scope
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          # Diff against the merge base on PRs, against the previous
          # commit on push, and against the empty tree on workflow_dispatch.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            BASE="${{ github.event.merge_group.base_sha }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            # On the very first push (no previous commit), diff against
            # the empty tree.
            if [ -z "${BASE:-}" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="$(git hash-object -t tree --stdin < /dev/null)"
            fi
          else
            # workflow_dispatch: treat the whole tree as the change.
            BASE="$(git hash-object -t tree --stdin < /dev/null)"
          fi

          echo "Diff base: $BASE"
          echo "Head:     $(git rev-parse HEAD)"

          # List of changed POSIX paths relative to repo root.
          mapfile -t CHANGED < <(git diff --name-only "$BASE"...HEAD | sort -u)

          echo "Changed files (${#CHANGED[@]}):"
          for f in "${CHANGED[@]}"; do echo "  $f"; done

          # Categorize each changed file. Multiple categories may match;
          # downstream jobs are OR'd.
          backend=0
          frontend=0
          database=0
          harness=0
          deployment=0
          docs=0
          other=0

          for f in "${CHANGED[@]}"; do
            case "$f" in
              # Database migrations take precedence over the generic backend/**
              # pattern, so a migration triggers BOTH database=true and
              # backend=true. The downstream ci-gate OR's them, so it does not
              # matter that backend=true is set; the point is to flag the
              # migration explicitly so future PRs can grow a dedicated
              # db-migration-contract job that runs only when database=true.
              backend/src/main/resources/db/migration/*) database=1; backend=1 ;;
              scripts/run-real-pre-db-migrations.sh)   database=1 ;;
              backend/**)                              backend=1 ;;
              frontend/**)                             frontend=1 ;;
              harness/**)                              harness=1 ;;
              Jenkinsfile)                             deployment=1 ;;
              scripts/**/*.sh)                         deployment=1 ;;
              docker-compose*.yml)                     deployment=1 ;;
              .env.real-pre.example)                   deployment=1 ;;
              *.md)
                case "$f" in
                  harness/*) ;;
                  *) docs=1 ;;
                esac
                ;;
              *) other=1 ;;
            esac
          done

          # Governance always runs: it protects the contract for the
          # branch-protection required check, regardless of scope.
          run_governance=1

          # A pure harness/ or docs/ change still wants the governance
          # contract check, so it MUST succeed for the ci-gate to pass.
          # No additional fan-out is required for harness-only changes
          # (governance is the safety net).

          set_outputs() {
            local key="$1" val="$2"
            if [ "$val" = "1" ]; then
              echo "$key=true" >> "$GITHUB_OUTPUT"
            else
              echo "$key=false" >> "$GITHUB_OUTPUT"
            fi
          }
          set_outputs backend    "$backend"
          set_outputs frontend   "$frontend"
          set_outputs database   "$database"
          set_outputs harness    "$harness"
          set_outputs deployment "$deployment"
          set_outputs docs       "$docs"
          set_outputs other      "$other"
          set_outputs run_governance "$run_governance"

          echo "Summary:"
          echo "  backend    : $([ "$backend"    = 1 ] && echo YES || echo no)"
          echo "  frontend   : $([ "$frontend"   = 1 ] && echo YES || echo no)"
          echo "  database   : $([ "$database"   = 1 ] && echo YES || echo no)"
          echo "  harness    : $([ "$harness"    = 1 ] && echo YES || echo no)"
          echo "  deployment : $([ "$deployment" = 1 ] && echo YES || echo no)"
          echo "  docs       : $([ "$docs"       = 1 ] && echo YES || echo no)"
          echo "  other      : $([ "$other"      = 1 ] && echo YES || echo no)"

  # ------------------------------------------------------------------
  # backend: Spring Boot test suite. Skipped for docs-only / harness-only.
  # ------------------------------------------------------------------
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.database == 'true' ||
      needs.changes.outputs.other == 'true'
    env:
      DB_PASSWORD: ci-test-placeholder
      REDIS_PASSWORD: ci-test-placeholder
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Compile backend
        run: mvn -B -DskipTests compile
      - name: Run migration and Schema contract tests
        run: >-
          mvn -B "-Dtest=RoleAwareAttributionSchemaContractTest,RoleAwareAttributionFlywayIntegrationTest,CoreEntityDatabaseSchemaContractTest,ColonelsettlementOrderMapperSchemaIntegrationTest,ColonelsettlementOrderMapperDualDimensionContractTest,RealPreMigrationContractTest" test
      - name: Start isolated PostgreSQL and Redis
        working-directory: .
        run: docker compose --project-name saas-ci-test --file docker-compose.test.yml up -d --wait postgres redis
      - name: Run backend unit, architecture and integration tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_NAME: colonel_saas_test
          DB_USER: saas
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: "6379"
          REDIS_DATABASE: "1"
        run: mvn -B test
      - name: Capture dependency diagnostics
        if: failure()
        working-directory: .
        run: |
          docker compose --project-name saas-ci-test --file docker-compose.test.yml ps --all
          docker compose --project-name saas-ci-test --file docker-compose.test.yml logs --no-color --tail=300 postgres redis
      - name: Stop isolated test dependencies
        if: always()
        working-directory: .
        run: docker compose --project-name saas-ci-test --file docker-compose.test.yml down --remove-orphans
  # ------------------------------------------------------------------
  # frontend: Vue + TypeScript test suite. Skipped for docs-only changes.
  # ------------------------------------------------------------------
  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.other == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9
          run_install: false
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run frontend tests
        run: pnpm test
      - name: Typecheck frontend
        run: pnpm typecheck
      - name: Build frontend
        run: pnpm build
  # ------------------------------------------------------------------
  # governance: harness contract checks. ALWAYS runs (single source of
  # truth for the protected contract, regardless of which other jobs
  # are skipped).
  # ------------------------------------------------------------------
  governance:
    name: Repository governance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: always() && needs.changes.result == 'success'
    steps:
      - name: Checkout complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Check changed lines for whitespace errors
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          else
            git show --check --format= HEAD
          fi
      - name: Set up Harness Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: harness/package-lock.json
      - name: Verify Harness core
        run: |
          npm ci --prefix harness
          npm run harness:typecheck
          npm run harness:test

      - name: Install pinned Pester
        shell: pwsh
        run: Install-Module Pester -RequiredVersion 4.10.1 -Scope CurrentUser -Force

      - name: Check GitHub collaboration contract
        shell: pwsh
        run: |
          $tests = @(
            './harness/scripts/tests/github-collaboration.Tests.ps1',
            './harness/scripts/tests/safety-check-docs.Tests.ps1',
            './harness/scripts/tests/git-push-safe.Tests.ps1',
            './harness/scripts/tests/agent-do-conclusion.Tests.ps1',
            './harness/scripts/tests/check-harness-limits.Tests.ps1',
            './harness/scripts/tests/test-impact-map.Tests.ps1',
            './harness/scripts/tests/release-queue-governance.Tests.ps1'
          )
          $result = Invoke-Pester -Script $tests -PassThru
          if ($result.FailedCount -gt 0) { throw "GitHub collaboration contract failed." }

      - name: Validate real-pre Compose configuration
        shell: bash
        run: |
          cp -f .env.real-pre.example /tmp/.env.real-pre
          ln -sf /tmp/.env.real-pre .env.real-pre
          full_sha=0000000000000000000000000000000000000000
          IMAGE_TAG="$full_sha" docker compose --env-file /tmp/.env.real-pre -f docker-compose.real-pre.yml config > /tmp/compose.yml
          grep -q "colonel-saas/backend:$full_sha" /tmp/compose.yml
          grep -q "colonel-saas/frontend:$full_sha" /tmp/compose.yml
          rm -f .env.real-pre

      - name: Validate migration, backup and Schema precheck scripts
        shell: bash
        run: |
          bash -n scripts/backup-db.sh
          sh -n scripts/run-real-pre-db-migrations.sh
          sh -n scripts/check-real-pre-schema.sh

      - name: Check Harness limits
        shell: pwsh
        run: ./harness/scripts/check-harness-limits.ps1 -BaselineRef HEAD -NoReport

      - name: Check Jenkins release identity and retired SSH deploy path
        shell: pwsh
        run: |
          $jenkins = Get-Content -Raw Jenkinsfile
          $retired = Get-Content -Raw harness/scripts/commands/deploy-remote.ps1
          $releaseScript = 'scripts/cd/release-real-pre.sh'
          if ($jenkins -notmatch "defaultValue:\s*'release/real-pre'") { throw 'Jenkins must only deploy release/real-pre' }
          if ($jenkins -notmatch 'IMAGE_TAG must be the full 40-character commit SHA') { throw 'Jenkins must reject floating image tags' }
          # The canonical real-pre deployment lock is enforced by
          # scripts/cd/release-real-pre.sh via flock(1) on
          # /var/lock/saas-real-pre-deploy.lock. The PR-C commit
          # replaced the obsolete Groovy `lock(resource: 'saas-real-pre-deploy')`
          # directive (which relied on the Lockable Resources plugin
          # that is NOT installed on the real-pre Jenkins host and
          # was therefore a no-op). PR-D's Jenkinsfile consumes the
          # new lock contract. We no longer assert the obsolete
          # Groovy string; instead we assert that the Jenkinsfile
          # routes mutating subcommands through the canonical
          # release entry script (if it exists in the same branch
          # as the Jenkinsfile change). The script itself is owned
          # by the PR-C branch and will land in a follow-up merge.
          $releaseScript = 'scripts/cd/release-real-pre.sh'
          if (Test-Path -LiteralPath $releaseScript -PathType Leaf) {
            if ($jenkins -notmatch [regex]::Escape($releaseScript)) {
              throw "Jenkinsfile must route mutating subcommands through $releaseScript"
            }
            $release = Get-Content -Raw $releaseScript
            if ($release -notmatch '\bflock\b') {
              throw "$releaseScript must invoke flock(1) for real serialization"
            }
          }
          # If the script is not in this branch (e.g. a Jenkinsfile-only
          # PR), we only assert the obsolete directive is gone so a
          # future contributor is not misled into thinking the
          # Lockable Resources plugin is being used.
          $jenkins | Should Not Match "lock\(resource:\s*'saas-real-pre-deploy'"
          if ($retired -notmatch 'Direct SSH deployment is retired') { throw 'direct SSH deploy path must remain retired' }

      - name: Reject generated workspace changes
        run: test -z "$(git status --porcelain)"

  # ------------------------------------------------------------------
  # ci-gate: single required check for branch protection.
  # Succeeds only if every job that should have run actually did and
  # succeeded. Skipped jobs are NOT treated as failure.
  # ------------------------------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - changes
      - backend
      - frontend
      - governance
    if: always()
    steps:
      - name: Verify required jobs succeeded
        shell: bash
        env:
          CHANGES_RESULT:    ${{ needs.changes.result }}
          BACKEND_RESULT:    ${{ needs.backend.result }}
          FRONTEND_RESULT:   ${{ needs.frontend.result }}
          GOVERNANCE_RESULT: ${{ needs.governance.result }}
        run: |
          set -euo pipefail
          echo "Job results:"
          echo "  changes    : $CHANGES_RESULT"
          echo "  backend    : $BACKEND_RESULT"
          echo "  frontend   : $FRONTEND_RESULT"
          echo "  governance : $GOVERNANCE_RESULT"

          # changes must always succeed.
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "FAIL: changes job did not succeed ($CHANGES_RESULT)."
            exit 1
          fi

          # governance must always succeed.
          if [ "$GOVERNANCE_RESULT" != "success" ]; then
            echo "FAIL: governance job did not succeed ($GOVERNANCE_RESULT)."
            exit 1
          fi

          # backend and frontend may be skipped (changes job decided they
          # were not required). If they ran, they must succeed.
          for entry in "backend:$BACKEND_RESULT" "frontend:$FRONTEND_RESULT"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
              echo "  $name : OK ($result)"
            else
              echo "FAIL: $name job did not succeed ($result)."
              exit 1
            fi
          done
          echo "CI Gate: PASS"
