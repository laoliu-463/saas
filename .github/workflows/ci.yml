name: CI

on:
  push:
    branches:
      - feature/auth-system
  pull_request:
    branches:
      - feature/auth-system
  merge_group:
    branches:
      - feature/auth-system
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DB_PASSWORD: ci-test-placeholder
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: colonel_saas_test
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: ci-test-placeholder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U saas -d colonel_saas_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        env:
          DB_HOST: 127.0.0.1
          REDIS_HOST: 127.0.0.1
          REDIS_DATABASE: "1"
        run: mvn -B test

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Build frontend
        run: pnpm build

  governance:
    name: Repository governance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout complete history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check changed lines for whitespace errors
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          else
            git show --check --format= HEAD
          fi

      - name: Install pinned Pester
        shell: pwsh
        run: Install-Module Pester -RequiredVersion 4.10.1 -Scope CurrentUser -Force

      - name: Check GitHub collaboration contract
        shell: pwsh
        run: |
          $tests = @(
            './harness/scripts/tests/github-collaboration.Tests.ps1',
            './harness/scripts/tests/safety-check-docs.Tests.ps1',
            './harness/scripts/tests/git-push-safe.Tests.ps1',
            './harness/scripts/tests/agent-do-conclusion.Tests.ps1',
            './harness/scripts/tests/check-harness-limits.Tests.ps1'
          )
          $result = Invoke-Pester -Script $tests -PassThru
          if ($result.FailedCount -gt 0) { throw "GitHub collaboration contract failed." }

      - name: Check Harness limits
        shell: pwsh
        run: ./harness/scripts/check-harness-limits.ps1 -BaselineRef HEAD -NoReport

      - name: Reject generated workspace changes
        shell: bash
        run: test -z "$(git status --porcelain)"
