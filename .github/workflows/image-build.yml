name: Image build and publish

on:
  # Build only on push to main, after the CI Gate has approved the
  # merge. The image tags are the 40-character commit SHA so the
  # Jenkins real-pre CD can verify it matches FULL_COMMIT exactly.
  push:
    branches:
      - main
    paths:
      # Jenkins, CI, docs and release metadata changes do not alter an
      # application image and must not trigger a duplicate image build.
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose*.yml'
  # Allow manual re-builds (e.g. for verifying a digest after a
  # historical release). workflow_dispatch requires the user to
  # supply the SHA explicitly.
  workflow_dispatch:
    inputs:
      sha:
        description: 'Full 40-character commit SHA to build'
        required: true
        type: string

permissions:
  contents: read
  packages: write

# Re-use the same concurrency group as ci.yml so a rebuild cannot
# race a CI re-run on the same SHA.
concurrency:
  group: image-build-${{ github.event_name }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish backend + frontend
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # GHCR image names. The repo's GitHub owner is hard-coded here;
      # the SHA is supplied by github.sha for push events or by the
      # workflow_dispatch input.
      GHCR_OWNER: laoliu-463
      BACKEND_IMAGE:  ghcr.io/laoliu-463/saas-backend
      FRONTEND_IMAGE: ghcr.io/laoliu-463/saas-frontend
    steps:
      - name: Resolve SHA to build
        id: resolve_sha
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            SHA="${{ github.sha }}"
          else
            SHA="${{ inputs.sha }}"
          fi
          if ! printf '%s' "$SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "ERROR: SHA must be the full 40-character commit SHA, got: $SHA"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved SHA: $SHA"

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve_sha.outputs.sha }}

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package backend artifact
        working-directory: backend
        run: mvn -B -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      # ------------------------------------------------------------------
      # Backend
      # ------------------------------------------------------------------
      - name: Build backend image
        id: build_backend
        shell: bash
        env:
          SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          set -euo pipefail
          BACKEND_TAG="${BACKEND_IMAGE}:${SHA}"
          docker build \
            --build-arg "GIT_COMMIT=${SHA}" \
            --tag "${BACKEND_TAG}" \
            --tag "${BACKEND_IMAGE}:latest" \
            --label "org.opencontainers.image.revision=${SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f backend/Dockerfile \
            backend
          echo "Backend image built: ${BACKEND_TAG}"

      - name: Push backend image
        id: push_backend
        env:
          SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          set -euo pipefail
          BACKEND_TAG="${BACKEND_IMAGE}:${SHA}"
          docker push "$BACKEND_TAG"
          BACKEND_DIGEST="$(docker image inspect "$BACKEND_TAG" --format '{{range .RepoDigests}}{{println .}}{{end}}' \
            | awk -F@ -v prefix="${BACKEND_IMAGE}@" 'index($0, prefix) == 1 { print substr($0, length(prefix) + 1); exit }')"
          printf '%s' "$BACKEND_DIGEST" | grep -Eq '^sha256:[0-9a-f]{64}$'
          echo "backend_digest=${BACKEND_DIGEST}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Frontend
      # ------------------------------------------------------------------
      - name: Build frontend image
        id: build_frontend
        shell: bash
        env:
          SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          set -euo pipefail
          FRONTEND_TAG="${FRONTEND_IMAGE}:${SHA}"
          docker build \
            --build-arg "GIT_COMMIT=${SHA}" \
            --build-arg "VITE_ENV_LABEL=REAL-PRE" \
            --tag "${FRONTEND_TAG}" \
            --tag "${FRONTEND_IMAGE}:latest" \
            --label "org.opencontainers.image.revision=${SHA}" \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f frontend/Dockerfile \
            frontend
          echo "Frontend image built: ${FRONTEND_TAG}"

      - name: Push frontend image
        id: push_frontend
        env:
          SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          set -euo pipefail
          FRONTEND_TAG="${FRONTEND_IMAGE}:${SHA}"
          docker push "$FRONTEND_TAG"
          FRONTEND_DIGEST="$(docker image inspect "$FRONTEND_TAG" --format '{{range .RepoDigests}}{{println .}}{{end}}' \
            | awk -F@ -v prefix="${FRONTEND_IMAGE}@" 'index($0, prefix) == 1 { print substr($0, length(prefix) + 1); exit }')"
          printf '%s' "$FRONTEND_DIGEST" | grep -Eq '^sha256:[0-9a-f]{64}$'
          echo "frontend_digest=${FRONTEND_DIGEST}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Record digests as a build artifact. Release promotion consumes the
      # release/real-pre manifest; this workflow must not push generated
      # files directly to protected main.
      # ------------------------------------------------------------------
      - name: Record digests
        env:
          SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cat > "release-artifacts/image-digests.json" <<EOF
          {
            "gitSha": "${SHA}",
            "branch": "main",
            "registry": "ghcr.io",
            "owner": "${GHCR_OWNER}",
            "backend": {
              "image": "${BACKEND_IMAGE}",
              "tag": "${SHA}",
              "digest": "${{ steps.push_backend.outputs.backend_digest }}"
            },
            "frontend": {
              "image": "${FRONTEND_IMAGE}",
              "tag": "${SHA}",
              "digest": "${{ steps.push_frontend.outputs.frontend_digest }}"
            }
          }
          EOF
          cat "release-artifacts/image-digests.json"

      - name: Upload digest artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4
        with:
          name: image-digests-${{ steps.resolve_sha.outputs.sha }}
          path: release-artifacts/image-digests.json
          if-no-files-found: error
          retention-days: 90

      - name: Summarize
        env:
          SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          echo "## Image build summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA:       \`${SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend:   \`${BACKEND_IMAGE}@${{ steps.push_backend.outputs.backend_digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend:  \`${FRONTEND_IMAGE}@${{ steps.push_frontend.outputs.frontend_digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Jenkins can deploy this release with:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "BACKEND_IMAGE_DIGEST=${{ steps.push_backend.outputs.backend_digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "FRONTEND_IMAGE_DIGEST=${{ steps.push_frontend.outputs.frontend_digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "IMAGE_TAG=${SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
