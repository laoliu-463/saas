    role: verify-as-task
    assigned_to: verifier
    depends_on: [t0-master-data, t1-product, t2-orders, t3-sample, t4-talent, t5-performance, t6-commission, t7-system]
    timeout_ms: 1800000
    prompt: |
      # 任务
      跨 7 个 track 做总收口。**不只听 worker 汇报**,要**自己实跑**。

      # 必做
      1. **抽 2-3 个 track**(建议:商品 + 订单 + 系统),从每个抽 1-2 条筛选项,**自己 grep / 自己实跑**复现 6 层
      2. **总跑一次**:
         - `cd backend && mvn test` 验证全绿
