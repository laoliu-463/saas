version: 1
plan:
  name: 'V1 筛选代码审查与端到端修复'
  max_concurrency: 8
  max_consecutive_failures: 2
  max_cycles: 10
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  # ============================================================
  # T0 — 主数据/下拉:所有其他 track 的数据源,必须先于其他 track
  # ============================================================
  - id: t0-master-data
    title: '主数据下拉链路审查与修复(其他 track 前置依赖)'
    assigned_to: developer
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      # 任务
      审查并修复"主数据/下拉"链路。这是其他业务域筛选的前置依赖 — 你的产出被商品、订单、寄样、达人、业绩、系统等所有 track 依赖。

      # 涉及文件(必须先通读)
      - 前端 API: `frontend/src/api/auth.ts`、`frontend/src/api/douyin.ts`、其他 `frontend/src/api/*.ts` 中拉下拉的接口
      - 后端 controller: `backend/src/main/java/com/colonel/saas/controller/UserMasterDataController.java`、`ColonelPartnerMasterDataController.java`、`CurrentUserController.java`、`DouyinOAuthController.java`
      - 后端 service: `UserMasterDataService.java`、`ColonelPartnerMasterDataService.java`

      # 必做事项
      1. **6 层端到端走读**:列出所有 `/api/master-data/**` 和 `/api/current-user/**` 端点,逐端点对每条下拉筛选项走 UI→state→API→controller→service→SQL 六层,贴出每层证据
      2. 重点查:
         - 招商 / 团长下拉,商品 / 活动 / 达人 / 部门 / 角色下拉数据是否真到前端
         - 当前用户上下文接口(`/api/current-user`)返回的 `dataScope`(`self/group/all`)是否被前端正确应用到每个业务域筛选
         - 下拉数据是否被缓存(避免 N+1),缓存 key 是否会脏
      3. **修复**:发现的 bug 按 CLAUDE.md 规则修(代码 + docs/05 + docs/09 + 领域文档)
      4. **测试**:后端必须给每个下拉接口加单测,覆盖正常返回 / 空数据 / 鉴权失败三种 case
      5. 跑通:
         - `cd backend && mvn test -Dtest=UserMasterDataServiceTest,ColonelPartnerMasterDataServiceTest,CurrentUserControllerTest`
         - `cd frontend && npm run build`

      # 不允许
      - 不让前端直连抖音开放接口
      - 不动 `docs/归档/`
      - 不在订单域加业绩/提成/独家覆盖

      # 交付
      1. **改动文件清单**(用 `git diff --stat`)
      2. **6 层闭环审查表**(每条下拉一行,L1-L6 各列贴证据,FAIL 用 ⚠ 标)
      3. **修复 commit 列表**
      4. **跑通的命令输出**(`mvn test` / `npm run build` 末 20 行)
      5. **同步更新的文档清单**

      # 参考
      - 整体 plan: `tmp/plan-审查所有筛选代码.md`
      - 项目地图: `CLAUDE.md`(`[V1 必做]` 不变量必须遵守)
      - API 契约: `docs/05-API契约总表.md`
      - 数据范围: `docs/07-权限与数据范围.md`

      # 沟通
      任何跨 track 冲突(比如下拉 key 命名不一致)发回 orchestrator。

    verify_prompt: |
      # 你的任务
      独立审查 T0 主数据下拉链路的修复产出。不要只读 producer 的 6 层表,要**自己实跑**验证。

      # 必做
      1. 抽 1-2 个下拉接口,**自己 curl**(test 环境)看返回结构
      2. **自己 grep** 验证 controller `@RequestParam` 与前端 API `.ts` 中 query key 一致
      3. **自己 grep** 验证 service 的 `LambdaQueryWrapper` 真用了这些参数
      4. 跑 `cd backend && mvn test -Dtest=UserMasterDataServiceTest,ColonelPartnerMasterDataServiceTest` 验证测试真过
      5. 跑 `cd frontend && npm run build` 验证前端能编译
      6. 检查改动是否同步更新了 `docs/05-API契约总表.md`

      # FAIL 条件
      - 任何端点的 6 层里有一层缺失证据
      - 单测有缺漏或假绿(mock 代替真查询)
      - 数据范围 `self/group/all` 没在前端 store/composable 中体现
      - 没改 docs

  # ============================================================
  # T1 — 商品域(T1+T2+T3 同 worker 串行,共享 product-filters.ts)
  # ============================================================
  - id: t1-product
    title: '商品域筛选审查与修复(product-filters / ProductManage / ProductLibrary / ActivityList)'
    assigned_to: developer
    depends_on: [t0-master-data]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      # 任务
      串行完成商品域三个子筛选(用户决策:同 worker 串行,避免争用 `product-filters.ts`):
      1. **子筛选 1 — 商品管理**: `product/index.vue` + `ProductManageFilters` + 状态/工具栏/操作列
      2. **子筛选 2 — 商品库**: `product/ProductLibrary.vue` + `ProductLibraryFilterPanel` + 8 个子 filter 组件
      3. **子筛选 3 — 活动列表**: `product/ActivityList.vue`

      # 涉及文件(必须先通读)
      ## 状态(state)
      - `frontend/src/views/product/product-filters.ts`(核心 state)
      - `frontend/src/views/product/product-filters.test.ts`
      ## 页面
      - `frontend/src/views/product/index.vue`
      - `frontend/src/views/product/ProductLibrary.vue`
      - `frontend/src/views/product/ActivityList.vue`
      ## 组件(商品库为重点)
      - `frontend/src/views/product/components/ProductManageFilters.vue`
      - `frontend/src/views/product/components/ProductManageToolbar.vue`
      - `frontend/src/views/product/components/ProductStatusTabs.vue`
      - `frontend/src/views/product/components/ProductLibraryFilterPanel.vue`
      - `frontend/src/views/product/components/ProductBasicSearchBar.vue`
      - `frontend/src/views/product/components/ProductFilters.vue`(9+ chip)
      - `frontend/src/views/product/components/ProductSelectedFilters.vue`
      - `frontend/src/views/product/components/ProductDemandFilter.vue`
      - `frontend/src/views/product/components/ProductOtherFilter.vue`
      - `frontend/src/views/product/components/ProductTagFilter.vue`
      - `frontend/src/views/product/components/ProductCategoryFilter.vue`
      - `frontend/src/views/product/components/ProductManageTable.vue`
      - `frontend/src/views/product/components/ProductActionColumn.vue`
      ## API
      - `frontend/src/api/product.ts`、`frontend/src/api/activityProduct.ts`、`frontend/src/api/productManage.ts`
      ## 后端 controller
      - `ProductController.java`、`ColonelActivityController.java`、`ColonelActivityProductController.java`、`AdminProductDisplayController.java`、`ProductLibraryRepairController.java`
      ## 后端 service
      - `ProductService.java`、`ProductDisplayRuleService.java`、`ProductActivityManualSyncService.java`、`ProductActivitySyncJob.java`

      # 必做事项
      1. **6 层端到端走读**:逐条筛选项走 UI→state→API→controller→service→SQL,**每条都要有 ID**(如 T1-F-001)
      2. **重点验证**:
         - `product-filters.ts` 是唯一 state 源(无第二份副本)
         - `applyProductFilters` 内部过滤 vs 远端 query 的边界
         - `activityId` 联动赋值(三联赋值 recruitActivityId/activityId/recruitActivityName)
         - `allianceStatus` 转换到 `status` 的空值/非法值兜底
         - 招商/活动快速筛选 `displayReady` / `pendingAudit` / `readyAssign` 真能筛出不同数据集
         - 9+ chip 全部能从 state 写回并发出(ProductFilters.vue)
         - `ProductSelectedFilters` 的"清除"按钮真清掉 state
         - `assignmentFilter`(`assigned/unassigned/mine`)与 `self/group/all` 数据范围对齐
      3. **修复**:按 CLAUDE.md 规则(代码 + docs/05 + docs/09 + 领域文档)
      4. **测试**:后端给 `ProductService`、`ProductDisplayRuleService` 关键筛选方法加单测,前端 vitest 跑 product-filters.test.ts
      5. 跑通:
         - `cd backend && mvn test -Dtest=ProductServiceTest,ProductDisplayRuleServiceTest,ColonelActivityControllerTest`
         - `cd frontend && npm run build && npx vitest run frontend/src/views/product/product-filters.test.ts`

      # 不允许
      - 不在订单域加业绩/提成/独家覆盖(本任务不做订单)
      - 不动 `docs/归档/`
      - 不让前端直连抖音开放接口
      - 不在商品域塞业务规则(CLAUDE.md 不变量)

      # 交付
      1. 改动文件清单(`git diff --stat`)
      2. 6 层闭环审查表(每条筛选项一行,共 30+ 条,L1-L6 各列贴证据,FAIL ⚠ 标)
      3. 修复 commit 列表
      4. 跑通的命令输出
      5. 同步更新的文档清单

      # 参考
      - 整体 plan: `tmp/plan-审查所有筛选代码.md`(§5 详写)
      - 项目地图: `CLAUDE.md`、`AGENTS.md`
      - API 契约: `docs/05-API契约总表.md`(商品域部分)
      - 业务闭环: `docs/02-业务闭环总览.md`

    verify_prompt: |
      # 你的任务
      独立审查 T1 商品域三子筛选的修复。**自己实跑**,不只听汇报。

      # 必做
      1. **抽 1-2 个筛选条件**(例如 `displayReady` 快速筛选 / 商品库 `handCard` chip),自己从 UI 一路追到 SQL,确认 6 层都有证据
      2. **grep** 验证 `product-filters.ts` 是唯一 state 源(无第二份 `ref<...filters>` 出现)
      3. 跑 `cd backend && mvn test -Dtest=ProductServiceTest,ProductDisplayRuleServiceTest,ColonelActivityControllerTest`
      4. 跑 `cd frontend && npm run build`
      5. 跑 `cd frontend && npx vitest run frontend/src/views/product/product-filters.test.ts`
      6. 验证文档:`docs/05-API契约总表.md` 和商品域领域合同是否同步

      # FAIL 条件
      - `displayReady` / `pendingAudit` / `readyAssign` 快速筛选任何一条缺失 L5 SQL 条件
      - 9+ chip 任何一个 chip 没有 state 写回逻辑
      - 招商角色数据范围没对齐(例如 biz_staff 能看到别人的活动)
      - 文档没同步

  # ============================================================
  # T2 — 订单域
  # ============================================================
  - id: t2-orders
    title: '订单域筛选审查与修复(订单列表 / 归因)'
    assigned_to: developer
    depends_on: [t0-master-data]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      # 任务
      审查并修复订单域的筛选功能。

      # 涉及文件
      ## 前端
      - `frontend/src/views/data/OrderList.vue`
      - `frontend/src/views/orders/index.vue`
      - `frontend/src/views/orders/components/OrderDetailModal.vue`
      - `frontend/src/api/order.ts`
      ## 后端
      - `OrderController.java`、`OrderAttributionController.java`
      - `OrderService.java`、`OrderAttributionService.java`

      # 必做事项
      1. **6 层端到端走读**,每条筛选项 ID(如 T2-F-001)
      2. **重点验证**:
         - 订单归因字段在两 view 间是否一致(`orders/index.vue` 与 `data/OrderList.vue` 字段名、类型、是否传空)
         - 时间区间筛选(起/止)是否被后端正确解析(类型、时区)
         - 导出按钮是否与筛选状态绑定(导出的是筛选后还是全量)
         - `dataScope` 在订单域是否生效(非 admin 只能看自己/本组)
         - 订单域**不应用独家覆盖**(CLAUDE.md 不变量)
      3. **修复**:按 CLAUDE.md 规则
      4. **测试**:后端给 `OrderService.findPage`、`OrderAttributionService` 加单测
      5. 跑通:
         - `cd backend && mvn test -Dtest=OrderServiceTest,OrderAttributionServiceTest,OrderControllerTest`
         - `cd frontend && npm run build`

      # 不允许
      - **绝不在订单域加业绩/提成/独家覆盖逻辑**
      - 不动 `docs/归档/`

      # 交付
      同 T1 结构。

      # 参考
      - 整体 plan: `tmp/plan-审查所有筛选代码.md` §6 T4
      - 项目地图: `CLAUDE.md`
      - API 契约: `docs/05-API契约总表.md`(订单域)

    verify_prompt: |
      # 你的任务
      独立审查 T2 订单域。

      # 必做
      1. 抽 1-2 条筛选(时间区间、归因字段)自己实跑 mvn test
      2. grep 验证订单域**没有**业绩/提成/独家覆盖的字段(只有事实)
      3. 跑 `cd backend && mvn test -Dtest=OrderServiceTest,OrderAttributionServiceTest`
      4. 跑 `cd frontend && npm run build`

      # FAIL 条件
      - 时间区间参数类型不匹配(后端期望 LocalDateTime 收 String)
      - 订单域出现 `commission` / `royalty` / `finalAmount` 字段(L1L5 任何一处)
      - 归因字段在两 view 间不一致

  # ============================================================
  # T3 — 寄样域
  # ============================================================
  - id: t3-sample
    title: '寄样域筛选审查与修复(申请/审批/工作台)'
    assigned_to: developer
    depends_on: [t0-master-data]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      # 任务
      审查并修复寄样域的筛选功能(6 个输入 + 1 个多选,字段最多)。

      # 涉及文件
      ## 前端
      - `frontend/src/views/sample/Apply.vue`
      - `frontend/src/views/sample/index.vue`
      - `frontend/src/views/sample/CooperationWorkbench.vue`(字段最多,重点)
      - `frontend/src/views/sample/SampleDetail.vue`
      - `frontend/src/views/sample/components/*.vue`
      - `frontend/src/api/sample.ts`
      ## 后端
      - `SampleController.java`、`SampleFilterOptionsController.java`
      - `SampleService.java` 等

      # 必做事项
      1. **6 层端到端走读**,每条筛选项 ID
      2. **重点验证**:
         - `CooperationWorkbench` 的 6 个输入(商品/店铺/物流单号/申请编号/达人/招商) + 1 个渠道多选,每个都从 UI 到 SQL
         - 申请编号 / 物流单号 / 达人昵称 是不是真作为精确查询(不是模糊)
         - `SampleFilterOptionsController` 给到所有需要的下拉项
         - 寄样完成判断:`orders-synced` 事件(CLAUDE.md 不变量)
      3. **修复** + **测试** + **跑通**:
         - `cd backend && mvn test -Dtest=SampleServiceTest,SampleControllerTest`
         - `cd frontend && npm run build`

      # 交付
      同 T1 结构。

      # 参考
      - 整体 plan: `tmp/plan-审查所有筛选代码.md` §6 T5
      - 寄样域: `docs/领域/寄样域.md`(如有)

    verify_prompt: |
      # 你的任务
      抽 CooperationWorkbench 的 2-3 个筛选项实跑 mvn test + npm run build。验证 6 层证据。FAIL 条件同前。

  # ============================================================
  # T4 — 达人域
  # ============================================================
  - id: t4-talent
    title: '达人域筛选审查与修复'
    assigned_to: developer
    depends_on: [t0-master-data]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      # 任务
      审查并修复达人域筛选。

      # 涉及文件
      - 前端: `frontend/src/views/talent/index.vue`、`frontend/src/views/talent/components/TalentMetricFilters.vue`、`frontend/src/views/talent/components/TalentDetailModal.vue`
      - API: `frontend/src/api/talent.ts`
      - 后端 controller: `TalentController.java`、`TalentProfileController.java`
      - 后端 service: `TalentService.java`

      # 必做
      1. 6 层走读,每条 ID
      2. 重点: 指标筛选(粉丝数/GMV 等范围)与文本筛选分离;`TalentProfileController` 字段一致性
      3. 修复 + 测试
      4. 跑通:`mvn test -Dtest=TalentServiceTest,TalentControllerTest` + `npm run build`

      # 交付
      同 T1 结构。

      # 参考
      - 整体 plan: §6 T6
      - 达人域: `docs/领域/达人域.md`(如有)

    verify_prompt: |
      抽 TalentMetricFilters 1-2 个筛选项实跑。FAIL 条件同前。

  # ============================================================
  # T5 — 业绩/数据分析
  # ============================================================
  - id: t5-performance
    title: '业绩与数据分析筛选审查与修复'
    assigned_to: developer
    depends_on: [t0-master-data]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      # 任务
      审查并修复业绩/分析/看板的筛选功能。

      # 涉及文件
      - 前端: `frontend/src/views/data/index.vue`、`frontend/src/views/dashboard/index.vue`
      - API: `frontend/src/api/performance.ts`、`frontend/src/api/data.ts`、`frontend/src/api/dashboard.ts`
      - 后端: `PerformanceController.java`、`DataController.java`、`DashboardController.java` 及 service

      # 必做
      1. 6 层走读
      2. 重点: 时间维度 + 部门维度 + 业务线 联动;**CLAUDE.md 不变量**:"分析模块只读汇总表,不重算业绩归属"
      3. 修复 + 测试
      4. 跑通:`mvn test -Dtest=PerformanceServiceTest,DataServiceTest,DashboardServiceTest` + `npm run build`

      # 不允许
      - **绝不在分析模块加业绩归属重算逻辑**
      - 业绩域专属逻辑(归属/提成/冲正)只能在 `PerformanceService` / `CommissionRuleService`

      # 交付
      同 T1 结构。

      # 参考
      - 整体 plan: §6 T7
      - 业绩域: `docs/领域/业绩域.md`(如有)

    verify_prompt: |
      抽 1-2 条业绩/分析筛选实跑。**特别检查**:分析模块有没有重算归属的代码,如果有直接 FAIL。

  # ============================================================
  # T6 — 佣金/规则
  # ============================================================
  - id: t6-commission
    title: '佣金规则与规则中心筛选审查与修复'
    assigned_to: developer
    depends_on: [t0-master-data]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      # 任务
      审查并修复佣金规则、规则中心的筛选。

      # 涉及文件
      - 前端: `frontend/src/views/system/rule-center/index.vue`、`frontend/src/views/system/CommissionRuleList.vue`
      - API: `frontend/src/api/commission.ts`、`frontend/src/api/ruleCenter.ts`
      - 后端: `CommissionRuleController.java`、`RuleCenterController.java` 及 service

      # 必做
