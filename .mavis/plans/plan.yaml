      2. 重点: 规则生效时间区间 / 状态 / 类型 联动;`dataScope` 在规则中心是否生效
      3. 修复 + 测试
      4. 跑通:`mvn test -Dtest=CommissionRuleServiceTest,RuleCenterServiceTest` + `npm run build`

      # 交付
      同 T1 结构。

      # 参考
      - 整体 plan: §6 T8

    verify_prompt: |
      抽 1-2 条规则筛选实跑。FAIL 条件同前。

  # ============================================================
  # T7 — 系统管理
  # ============================================================
  - id: t7-system
    title: '系统管理筛选审查与修复(用户/角色/部门/日志/配置)'
    assigned_to: developer
    depends_on: [t0-master-data]
    verified_by: verifier
    timeout_ms: 1800000
    prompt: |
      # 任务
      审查并修复系统管理域筛选(5 个页面,1 个聚合任务)。

      # 涉及文件
      - 前端: `frontend/src/views/system/UserList.vue`、`RoleList.vue`、`DeptList.vue`、`OperationLogList.vue`、`ConfigList.vue`
      - API: `frontend/src/api/sys.ts`
      - 后端: `SysUserController.java`、`SysRoleController.java`、`SysDeptController.java`、`SysMenuController.java`、`SysConfigController.java`、`OperationLogController.java` 及对应 service

      # 必做
      1. 6 层走读
      2. 重点:
         - 用户列表"角色/部门/状态"三联筛选
         - `SysUserService.findPage` 的 queryWrapper **必须用** `dataScope`(CLAUDE.md 不变量)
         - 操作日志的"操作人/时间区间/模块"三联筛选
      3. 修复 + 测试
      4. 跑通:`mvn test -Dtest=SysUserServiceTest,SysRoleServiceTest,SysDeptServiceTest,OperationLogServiceTest` + `npm run build`

      # 交付
      同 T1 结构。

      # 参考
      - 整体 plan: §6 T9

    verify_prompt: |
