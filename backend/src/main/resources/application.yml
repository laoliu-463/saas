saas:
  env-label: ${APP_ENV_LABEL:}

spring:
  application:
    name: colonel-saas
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:test}
  datasource:
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${DB_HIKARI_MIN_IDLE:5}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_HIKARI_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME_MS:1800000}
  data:
    redis:
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:16}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:2}
          max-wait: ${REDIS_POOL_MAX_WAIT:2s}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.colonel.saas.entity,com.colonel.saas.domain.event
  type-handlers-package: com.colonel.saas.common.handler
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    info:
      enabled: true

logging:
  level:
    com.colonel.saas: debug
    com.baomidou.mybatisplus: info

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

security:
  jwt:
    secret: ${JWT_SECRET:test-secret-key-replace-before-real-pre-runtime}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}

performance:
  cache:
    warmup:
      enabled: ${PERFORMANCE_CACHE_WARMUP_ENABLED:false}
      cron: ${PERFORMANCE_CACHE_WARMUP_CRON:0 0 3 * * ?}
      days: ${PERFORMANCE_CACHE_WARMUP_DAYS:7}
  recalculate-failed:
    enabled: ${PERFORMANCE_RECALCULATE_FAILED_ENABLED:false}
    cron: ${PERFORMANCE_RECALCULATE_FAILED_CRON:0 */10 * * * ?}
    limit: ${PERFORMANCE_RECALCULATE_FAILED_LIMIT:100}

product:
  activity:
    sync:
      enabled: ${PRODUCT_ACTIVITY_SYNC_ENABLED:false}
      cron: "${PRODUCT_ACTIVITY_SYNC_CRON:0 */5 * * * ?}"
      batch-size: ${PRODUCT_ACTIVITY_SYNC_BATCH_SIZE:20}
      whitelist-activities: "${PRODUCT_ACTIVITY_SYNC_WHITELIST_ACTIVITIES:}"
  sync:
    activityProduct:
      pageSize: ${PRODUCT_SYNC_ACTIVITY_PRODUCT_PAGE_SIZE:20}
      maxPagesPerActivity: ${PRODUCT_SYNC_ACTIVITY_PRODUCT_MAX_PAGES_PER_ACTIVITY:1000}
      maxRowsPerActivity: ${PRODUCT_SYNC_ACTIVITY_PRODUCT_MAX_ROWS_PER_ACTIVITY:50000}
      maxActivitiesPerRun: ${PRODUCT_SYNC_ACTIVITY_PRODUCT_MAX_ACTIVITIES_PER_RUN:100}
      fullBackfillEnabled: ${PRODUCT_SYNC_ACTIVITY_PRODUCT_FULL_BACKFILL_ENABLED:true}
      incrementalEnabled: ${PRODUCT_SYNC_ACTIVITY_PRODUCT_INCREMENTAL_ENABLED:${PRODUCT_ACTIVITY_SYNC_ENABLED:false}}
      apiSleepMs: ${PRODUCT_SYNC_ACTIVITY_PRODUCT_API_SLEEP_MS:300}
      errorThreshold: ${PRODUCT_SYNC_ACTIVITY_PRODUCT_ERROR_THRESHOLD:5}
      cursorRepeatLimit: ${PRODUCT_SYNC_ACTIVITY_PRODUCT_CURSOR_REPEAT_LIMIT:1}
    # Phase 4-1.5 deadlock 修复：商品全量回补的并发/事务/重试配置。
    backfill:
      writeBatchSize: ${PRODUCT_SYNC_BACKFILL_WRITE_BATCH_SIZE:100}
      deadlockRetryMax: ${PRODUCT_SYNC_BACKFILL_DEADLOCK_RETRY_MAX:3}
      lockWaitSeconds: ${PRODUCT_SYNC_BACKFILL_LOCK_WAIT_SECONDS:10}
      runningTimeoutMinutes: ${PRODUCT_SYNC_BACKFILL_RUNNING_TIMEOUT_MINUTES:30}
      displayRefreshMode: ${PRODUCT_SYNC_BACKFILL_DISPLAY_REFRESH_MODE:DEFERRED}
      skipDisplayRefreshForExpiredActivity: ${PRODUCT_SYNC_BACKFILL_SKIP_DISPLAY_REFRESH_FOR_EXPIRED:true}
      apiSleepMs: ${PRODUCT_SYNC_BACKFILL_API_SLEEP_MS:100}
      staleReconcileCron: ${PRODUCT_SYNC_BACKFILL_STALE_RECONCILE_CRON:0 */15 * * * ?}

app:
  performance:
    slow-query-threshold-ms: ${APP_SLOW_QUERY_THRESHOLD_MS:500}
  short-ttl-cache:
    max-entries: ${APP_SHORT_TTL_CACHE_MAX_ENTRIES:1024}
  logistics:
    refresh-job-enabled: ${APP_LOGISTICS_REFRESH_JOB_ENABLED:false}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
  test:
    enabled: ${APP_TEST_ENABLED:false}
    seed-on-startup: ${APP_TEST_SEED_ON_STARTUP:false}
    douyin: ${APP_TEST_DOUYIN_ENABLED:false}
    promotion: ${APP_TEST_PROMOTION_ENABLED:false}
    order: ${APP_TEST_ORDER_ENABLED:false}
    talent: ${APP_TEST_TALENT_ENABLED:false}
    logistics: ${APP_TEST_LOGISTICS_ENABLED:false}

logistics:
  provider: ${LOGISTICS_PROVIDER:mock}
  query:
    timeout-seconds: ${LOGISTICS_QUERY_TIMEOUT_SECONDS:10}
    retry-count: ${LOGISTICS_QUERY_RETRY_COUNT:1}
  kdn:
    enabled: ${LOGISTICS_KDN_ENABLED:false}
    ebusiness-id: ${LOGISTICS_KDN_EBUSINESS_ID:}
    api-key: ${LOGISTICS_KDN_API_KEY:}
    endpoint: ${LOGISTICS_KDN_ENDPOINT:https://api.kdniao.com/Ebusiness/EbusinessOrderHandle.aspx}
    sandbox-enabled: ${LOGISTICS_KDN_SANDBOX_ENABLED:false}
  kd100:
    enabled: ${LOGISTICS_KD100_ENABLED:false}
    subscribe-enabled: ${LOGISTICS_KD100_SUBSCRIBE_ENABLED:false}
    customer: ${LOGISTICS_KD100_CUSTOMER:}
    key: ${LOGISTICS_KD100_KEY:}
    endpoint: ${LOGISTICS_KD100_ENDPOINT:https://poll.kuaidi100.com/poll/query.do}
    subscribe-endpoint: ${LOGISTICS_KD100_SUBSCRIBE_ENDPOINT:https://poll.kuaidi100.com/poll}
    callback-url: ${LOGISTICS_KD100_CALLBACK_URL:}
    callback-salt: ${LOGISTICS_KD100_CALLBACK_SALT:}
    result-v2: ${LOGISTICS_KD100_RESULT_V2:4}
    sandbox-enabled: ${LOGISTICS_KD100_SANDBOX_ENABLED:false}
  sync:
    enabled: ${LOGISTICS_SYNC_ENABLED:false}
    cron: ${LOGISTICS_SYNC_CRON:0 */30 * * * ?}
    batch-size: ${LOGISTICS_SYNC_BATCH_SIZE:100}

exclusive:
  enabled: ${EXCLUSIVE_ENABLED:false}

douyin:
  app:
    base-url: ${DOUYIN_BASE_URL:https://openapi-fxg.jinritemai.com}
    app-id: ${DOUYIN_APP_ID:}
    client-key: ${DOUYIN_CLIENT_KEY:}
    client-secret: ${DOUYIN_CLIENT_SECRET:}
    sandbox: ${DOUYIN_SANDBOX:false}
    connect-timeout: ${DOUYIN_CONNECT_TIMEOUT:3s}
    read-timeout: ${DOUYIN_READ_TIMEOUT:5s}
  oauth:
    authorize-url: ${DOUYIN_OAUTH_AUTHORIZE_URL:https://op.jinritemai.com/oauth2/authorize}
    power-manage-url: ${DOUYIN_OAUTH_POWER_MANAGE_URL:https://buyin.jinritemai.com/dashboard/institution/power-manage}
    redirect-uri: ${DOUYIN_OAUTH_REDIRECT_URI:https://localhost:8081/api/douyin/oauth/callback}
    frontend-success-url: ${DOUYIN_OAUTH_FRONTEND_SUCCESS_URL:http://localhost:3001/system/douyin?oauth=success}
    frontend-failure-url: ${DOUYIN_OAUTH_FRONTEND_FAILURE_URL:http://localhost:3001/system/douyin?oauth=failed}
    state-ttl-minutes: ${DOUYIN_OAUTH_STATE_TTL_MINUTES:10}
  webhook:
    verify-sign: ${DOUYIN_WEBHOOK_VERIFY_SIGN:true}
  test:
    enabled: ${DOUYIN_TEST_ENABLED:false}
  real:
    upstream-mode: ${DOUYIN_REAL_UPSTREAM_MODE:live}
    promotion-write-enabled: ${DOUYIN_REAL_PROMOTION_WRITE_ENABLED:false}
    allow-promotion-write: ${ALLOW_REAL_PROMOTION_WRITE:false}
  token:
    refresh-threshold-seconds: ${DOUYIN_TOKEN_REFRESH_THRESHOLD_SECONDS:300}
    redis-lock-minutes: ${DOUYIN_TOKEN_REDIS_LOCK_MINUTES:5}
    auto-refresh:
      enabled: ${DOUYIN_TOKEN_AUTO_REFRESH_ENABLED:true}
      cron: ${DOUYIN_TOKEN_AUTO_REFRESH_CRON:0 */10 * * * ?}
  order:
    settlement-source: ${DOUYIN_ORDER_SETTLEMENT_SOURCE:instituteOrderColonel}
    institute-settlement-time-type: ${DOUYIN_ORDER_INSTITUTE_SETTLEMENT_TIME_TYPE:update}
    settlement-fallback-enabled: ${DOUYIN_ORDER_SETTLEMENT_FALLBACK_ENABLED:false}
    settlement-dual-read-no-write-enabled: ${DOUYIN_ORDER_SETTLEMENT_DUAL_READ_NO_WRITE_ENABLED:false}
    allow-estimate-as-effective-fallback: ${DOUYIN_ORDER_ALLOW_ESTIMATE_AS_EFFECTIVE_FALLBACK:false}

order:
  sync:
    enabled: ${ORDER_SYNC_ENABLED:true}
    max-pages: ${ORDER_SYNC_MAX_PAGES:500}
    max-orders: ${ORDER_SYNC_MAX_ORDERS:50000}
    lag-seconds: ${ORDER_SYNC_LAG_SECONDS:60}
    window-seconds: ${ORDER_SYNC_WINDOW_SECONDS:600}
    overlap-seconds: ${ORDER_SYNC_OVERLAP_SECONDS:60}
    cron: ${ORDER_SYNC_CRON:0 */3 * * * ?}
    pay-recent:
      enabled: ${ORDER_SYNC_PAY_RECENT_ENABLED:true}
      cron: ${ORDER_SYNC_PAY_RECENT_CRON:0 */30 * * * ?}
    settle:
      enabled: ${ORDER_SYNC_SETTLE_ENABLED:true}
      cron: ${ORDER_SYNC_SETTLE_CRON:0 5 */6 * * ?}
      lag-seconds: ${ORDER_SYNC_SETTLE_LAG_SECONDS:60}
      window-seconds: ${ORDER_SYNC_SETTLE_WINDOW_SECONDS:86400}
      overlap-seconds: ${ORDER_SYNC_SETTLE_OVERLAP_SECONDS:300}
    institute-recent:
      enabled: ${ORDER_SYNC_INSTITUTE_RECENT_ENABLED:true}
      cron: ${ORDER_SYNC_INSTITUTE_RECENT_CRON:0 */10 * * * ?}
    institute-hot:
      enabled: ${ORDER_SYNC_INSTITUTE_HOT_ENABLED:true}
      cron: ${ORDER_SYNC_INSTITUTE_HOT_CRON:0 */1 * * * ?}
      lag-seconds: ${ORDER_SYNC_INSTITUTE_HOT_LAG_SECONDS:30}
      window-seconds: ${ORDER_SYNC_INSTITUTE_HOT_WINDOW_SECONDS:300}
      overlap-seconds: ${ORDER_SYNC_INSTITUTE_HOT_OVERLAP_SECONDS:120}
      page-size: ${ORDER_SYNC_INSTITUTE_HOT_PAGE_SIZE:100}
      max-pages: ${ORDER_SYNC_INSTITUTE_HOT_MAX_PAGES:10}
      max-orders: ${ORDER_SYNC_INSTITUTE_HOT_MAX_ORDERS:1000}
      lock-ttl-seconds: ${ORDER_SYNC_INSTITUTE_HOT_LOCK_TTL_SECONDS:90}
    institute-backfill:
      enabled: ${ORDER_SYNC_INSTITUTE_BACKFILL_ENABLED:true}
      cron: ${ORDER_SYNC_INSTITUTE_BACKFILL_CRON:0 15 0/6 * * ?}
    circuit-breaker:
      failure-threshold: ${ORDER_SYNC_CIRCUIT_FAILURE_THRESHOLD:3}
      open-duration: ${ORDER_SYNC_CIRCUIT_OPEN_DURATION:PT5M}

talent:
  enrich:
    mode: ${TALENT_ENRICH_MODE:real}
  collect:
    mode: ${TALENT_COLLECT_MODE:api_then_crawler}
    api:
      enabled: ${TALENT_COLLECT_API_ENABLED:false}
    timeout-seconds: ${TALENT_COLLECT_TIMEOUT_SECONDS:10}
    retry: ${TALENT_COLLECT_RETRY:2}
  refresh:
    enabled: ${TALENT_REFRESH_ENABLED:false}
    cron: ${TALENT_REFRESH_CRON:0 0 3 ? * MON}
    batch-size: ${TALENT_REFRESH_BATCH_SIZE:50}
    weekly-concurrency: ${TALENT_REFRESH_WEEKLY_CONCURRENCY:4}
  data:
    public-page-crawl-enabled: ${TALENT_PUBLIC_PAGE_CRAWL_ENABLED:false}
  profile:
    public-web:
      enabled: ${TALENT_PROFILE_PUBLIC_WEB_ENABLED:true}
    http:
      enabled: ${TALENT_PROFILE_HTTP_ENABLED:false}
      endpoint: ${TALENT_PROFILE_HTTP_ENDPOINT:}
      method: ${TALENT_PROFILE_HTTP_METHOD:GET}
      token: ${TALENT_PROFILE_HTTP_TOKEN:}
      header-authorization: ${TALENT_PROFILE_HTTP_AUTHORIZATION:}

kdniao:
  enabled: ${KDNIAO_ENABLED:false}
  request-url: ${KDNIAO_REQUEST_URL:}
  request-type: ${KDNIAO_REQUEST_TYPE:1002}
  base-url: ${KDNIAO_BASE_URL:https://api.kdniao.com}
  sandbox-url: ${KDNIAO_SANDBOX_URL:http://sandboxapi.kdniao.com:8080/kdniaosandbox/gateway/exterfaceInvoke.json}
  e-business-id: ${KDNIAO_EBUSINESS_ID:}
  app-key: ${KDNIAO_APP_KEY:}
  sandbox: ${KDNIAO_SANDBOX:false}
  connect-timeout: ${KDNIAO_CONNECT_TIMEOUT:5s}
  read-timeout: ${KDNIAO_READ_TIMEOUT:10s}

ddd:
  refactor:
    enabled: ${DDD_REFACTOR_ENABLED:false}
    user-facade:
      enabled: ${DDD_REFACTOR_USER_FACADE_ENABLED:false}
    config-facade:
      enabled: ${DDD_REFACTOR_CONFIG_FACADE_ENABLED:false}
    product-facade:
      enabled: ${DDD_REFACTOR_PRODUCT_FACADE_ENABLED:false}
    talent-facade:
      enabled: ${DDD_REFACTOR_TALENT_FACADE_ENABLED:false}
    sample-application:
      enabled: ${DDD_REFACTOR_SAMPLE_APPLICATION_ENABLED:false}
    order-application:
      enabled: ${DDD_REFACTOR_ORDER_APPLICATION_ENABLED:false}
    order-attribution:
      enabled: ${DDD_REFACTOR_ORDER_ATTRIBUTION_ENABLED:false}
    order-amount-policy:
      enabled: ${DDD_REFACTOR_ORDER_AMOUNT_POLICY_ENABLED:false}
    performance-calc:
      enabled: ${DDD_REFACTOR_PERFORMANCE_CALC_ENABLED:false}
    performance-query:
      enabled: ${DDD_REFACTOR_PERFORMANCE_QUERY_ENABLED:false}
    analytics-shadow:
      enabled: ${DDD_REFACTOR_ANALYTICS_SHADOW_ENABLED:false}
    outbox:
      enabled: ${DDD_REFACTOR_OUTBOX_ENABLED:false}
    sample-homework-event:
      enabled: ${DDD_REFACTOR_SAMPLE_HOMEWORK_EVENT_ENABLED:false}
