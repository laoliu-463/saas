spring:
  application:
    name: colonel-saas
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.colonel.saas.entity
  type-handlers-package: com.colonel.saas.common.handler
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.colonel.saas: debug
    com.baomidou.mybatisplus: info

security:
  jwt:
    secret: ${JWT_SECRET}
    expire-seconds: ${JWT_EXPIRE_SECONDS:7200}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*}

douyin:
  app:
    base-url: ${DOUYIN_BASE_URL:https://open.douyin.com}
    app-id: ${DOUYIN_APP_ID:}
    client-key: ${DOUYIN_CLIENT_KEY:}
    client-secret: ${DOUYIN_CLIENT_SECRET:}
    sandbox: ${DOUYIN_SANDBOX:false}
  token:
    refresh-threshold-seconds: ${DOUYIN_TOKEN_REFRESH_THRESHOLD_SECONDS:300}
    redis-lock-minutes: ${DOUYIN_TOKEN_REDIS_LOCK_MINUTES:5}
