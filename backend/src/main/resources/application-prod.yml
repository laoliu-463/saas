spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:colonel_saas}
    username: ${DB_USER:saas}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms

server:
  port: 8080
  servlet:
    context-path: /api

knife4j:
  enable: false

logging:
  level:
    com.colonel.saas: info
    com.doudian.open.core: warn
    org.springframework.web.client.RestTemplate: info

debug: false

talent:
  enrich:
    mode: ${TALENT_ENRICH_MODE:real}
  data:
    public-page-crawl-enabled: ${TALENT_PUBLIC_PAGE_CRAWL_ENABLED:false}

douyin:
  webhook:
    verify-sign: ${DOUYIN_WEBHOOK_VERIFY_SIGN:true}
  test:
    enabled: false

