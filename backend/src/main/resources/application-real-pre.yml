spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:saas_real_pre}
    username: ${DB_USER:saas}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 600000
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
  devtools:
    restart:
      enabled: false

server:
  port: 8080
  servlet:
    context-path: /api

knife4j:
  enable: false

security:
  jwt:
    secret: ${JWT_SECRET}

authorization:
  runtime:
    default-mode: ${AUTHORIZATION_RUNTIME_DEFAULT_MODE:LEGACY}
    snapshot-cache-ttl: ${AUTHORIZATION_SNAPSHOT_CACHE_TTL:5m}
    domain-modes: {}

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS}
  test:
    enabled: false
    seed-on-startup: false
    douyin: false
    promotion: false
    order: false
    talent: false
    logistics: false

talent:
  enrich:
    mode: ${TALENT_ENRICH_MODE:real}
  collect:
    mode: ${TALENT_COLLECT_MODE:api}
    api:
      enabled: ${TALENT_COLLECT_API_ENABLED:false}
  refresh:
    enabled: ${TALENT_REFRESH_ENABLED:false}
  data:
    public-page-crawl-enabled: ${TALENT_PUBLIC_PAGE_CRAWL_ENABLED:false}
  profile:
    public-web:
      enabled: ${TALENT_PROFILE_PUBLIC_WEB_ENABLED:false}
    http:
      enabled: ${TALENT_PROFILE_HTTP_ENABLED:false}
      endpoint: ${TALENT_PROFILE_HTTP_ENDPOINT:}
      method: ${TALENT_PROFILE_HTTP_METHOD:GET}
      token: ${TALENT_PROFILE_HTTP_TOKEN:}
      header-authorization: ${TALENT_PROFILE_HTTP_AUTHORIZATION:}

douyin:
  webhook:
    verify-sign: ${DOUYIN_WEBHOOK_VERIFY_SIGN:true}
  test:
    enabled: false

logging:
  level:
    root: info
    com.colonel.saas: info
    com.doudian.open.core: warn
    org.springframework.web.client.RestTemplate: info

debug: false

ddd:
  refactor:
    enabled: ${DDD_REFACTOR_ENABLED:true}
    user-facade:
      enabled: ${DDD_REFACTOR_USER_FACADE_ENABLED:true}
    config-facade:
      enabled: ${DDD_REFACTOR_CONFIG_FACADE_ENABLED:true}
    product-facade:
      enabled: ${DDD_REFACTOR_PRODUCT_FACADE_ENABLED:true}
    product-display-policy:
      enabled: ${DDD_REFACTOR_PRODUCT_DISPLAY_POLICY_ENABLED:true}
    talent-facade:
      enabled: ${DDD_REFACTOR_TALENT_FACADE_ENABLED:true}
    sample-application:
      enabled: ${DDD_REFACTOR_SAMPLE_APPLICATION_ENABLED:true}
    order-application:
      enabled: ${DDD_REFACTOR_ORDER_APPLICATION_ENABLED:true}
    order-attribution:
      enabled: ${DDD_REFACTOR_ORDER_ATTRIBUTION_ENABLED:true}
    order-amount-policy:
      enabled: ${DDD_REFACTOR_ORDER_AMOUNT_POLICY_ENABLED:true}
    performance-calc:
      enabled: ${DDD_REFACTOR_PERFORMANCE_CALC_ENABLED:true}
    performance-query:
      enabled: ${DDD_REFACTOR_PERFORMANCE_QUERY_ENABLED:true}
    analytics-shadow:
      enabled: ${DDD_REFACTOR_ANALYTICS_SHADOW_ENABLED:true}
    outbox:
      enabled: ${DDD_REFACTOR_OUTBOX_ENABLED:true}
    data-scope-policy:
      enabled: ${DDD_REFACTOR_DATA_SCOPE_POLICY_ENABLED:true}
    sample-homework-event:
      enabled: ${DDD_REFACTOR_SAMPLE_HOMEWORK_EVENT_ENABLED:true}
    colonel-partner-contact:
      enabled: ${DDD_REFACTOR_COLONEL_PARTNER_CONTACT_ENABLED:true}
