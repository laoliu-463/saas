security:
  jwt:
    secret: test-jwt-secret-for-unit-testing-only-placeholder-32chars

spring:
  flyway:
    # 测试环境不自动迁移；Flyway 集成测试显式创建独立数据库。
    enabled: false
  main:
    banner-mode: off
    log-startup-info: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:colonel_saas_test}
    username: ${DB_USER:saas}
    password: ${DB_PASSWORD:saas123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:1}
      timeout: 5000ms
  task:
    scheduling:
      enabled: false
  devtools:
    restart:
      enabled: false
  security:
    user:
      name: test-admin
      password: test-admin123-change-me

server:
  port: 8080
  servlet:
    context-path: /api

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  short-ttl-cache:
    redis-invalidation-enabled: false
  domain-event:
    dispatch-enabled: false
  test:
    enabled: true
    seed-on-startup: true
    douyin: true
    promotion: true
    order: true
    talent: true
    logistics: true

talent:
  profile:
    schema-bootstrap:
      enabled: false
  enrich:
    mode: ${TALENT_ENRICH_MODE:test}
  collect:
    mode: mock
    api:
      enabled: false
  refresh:
    enabled: false
  data:
    public-page-crawl-enabled: ${TALENT_PUBLIC_PAGE_CRAWL_ENABLED:false}

douyin:
  test:
    enabled: true
  token:
    auto-refresh:
      enabled: false

mybatis-plus:
  global-config:
    banner: false

logging:
  level:
    root: info
    com.colonel.saas: info
    com.baomidou.mybatisplus: warn
    com.zaxxer.hikari: warn
    org.mybatis: warn
    org.springframework: info
    org.springframework.boot: info
    org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger: error
    org.springframework.boot.devtools: warn
    org.springframework.data.repository.config: warn
    org.springframework.jdbc.core: warn
    org.springframework.test: info
    org.springframework.test.web.servlet: warn
    org.springframework.mock.web: warn
    org.springframework.security: warn
    org.springframework.web: info

debug: false

ddd:
  refactor:
    enabled: ${DDD_REFACTOR_ENABLED:true}
    user-facade:
      enabled: ${DDD_REFACTOR_USER_FACADE_ENABLED:true}
    config-facade:
      enabled: ${DDD_REFACTOR_CONFIG_FACADE_ENABLED:true}
    product-facade:
      enabled: ${DDD_REFACTOR_PRODUCT_FACADE_ENABLED:true}
    product-display-policy:
      enabled: ${DDD_REFACTOR_PRODUCT_DISPLAY_POLICY_ENABLED:true}
    talent-facade:
      enabled: ${DDD_REFACTOR_TALENT_FACADE_ENABLED:true}
    sample-application:
      enabled: ${DDD_REFACTOR_SAMPLE_APPLICATION_ENABLED:true}
    order-application:
      enabled: ${DDD_REFACTOR_ORDER_APPLICATION_ENABLED:true}
    order-attribution:
      enabled: ${DDD_REFACTOR_ORDER_ATTRIBUTION_ENABLED:true}
    order-amount-policy:
      enabled: ${DDD_REFACTOR_ORDER_AMOUNT_POLICY_ENABLED:true}
    performance-calc:
      enabled: ${DDD_REFACTOR_PERFORMANCE_CALC_ENABLED:true}
    performance-query:
      enabled: ${DDD_REFACTOR_PERFORMANCE_QUERY_ENABLED:true}
    analytics-shadow:
      enabled: ${DDD_REFACTOR_ANALYTICS_SHADOW_ENABLED:true}
    outbox:
      enabled: ${DDD_REFACTOR_OUTBOX_ENABLED:true}
    data-scope-policy:
      enabled: ${DDD_REFACTOR_DATA_SCOPE_POLICY_ENABLED:true}
    sample-homework-event:
      enabled: ${DDD_REFACTOR_SAMPLE_HOMEWORK_EVENT_ENABLED:true}
    colonel-partner-contact:
      enabled: ${DDD_REFACTOR_COLONEL_PARTNER_CONTACT_ENABLED:true}
