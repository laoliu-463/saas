services:
  postgres-real-pre:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_real_pre_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/src/main/resources/db/alter-product-main-chain.sql:/docker-entrypoint-initdb.d/02-alter-product-main-chain.sql
      - ./backend/src/main/resources/db/alter-product-biz-status.sql:/docker-entrypoint-initdb.d/03-alter-product-biz-status.sql
      - ./backend/src/main/resources/db/alter-product-following.sql:/docker-entrypoint-initdb.d/04-alter-product-following.sql
      - ./backend/src/main/resources/db/alter-talent-enrich.sql:/docker-entrypoint-initdb.d/05-alter-talent-enrich.sql
      - ./backend/src/main/resources/db/alter-talent-crm-gap-fill.sql:/docker-entrypoint-initdb.d/06-alter-talent-crm-gap-fill.sql
      - ./backend/src/main/resources/db/alter-product-test-columns.sql:/docker-entrypoint-initdb.d/07-alter-product-test-columns.sql
      - ./backend/src/main/resources/db/alter-order-attribution-mvp.sql:/docker-entrypoint-initdb.d/08-alter-order-attribution-mvp.sql
      - ./backend/src/main/resources/db/alter-order-attribution-mvp-v2.sql:/docker-entrypoint-initdb.d/09-alter-order-attribution-mvp-v2.sql
      - ./backend/src/main/resources/db/alter-order-pick-source-length.sql:/docker-entrypoint-initdb.d/10-alter-order-pick-source-length.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  redis-real-pre:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_real_pre_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  backend-real-pre:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8081:8080"
      - "5006:5005"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVER_PORT: 8080
      DB_HOST: postgres-real-pre
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis-real-pre
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      DOUYIN_BASE_URL: ${DOUYIN_BASE_URL}
      DOUYIN_APP_ID: ${DOUYIN_APP_ID}
      DOUYIN_CLIENT_KEY: ${DOUYIN_CLIENT_KEY}
      DOUYIN_CLIENT_SECRET: ${DOUYIN_CLIENT_SECRET}
      DOUYIN_SANDBOX: ${DOUYIN_SANDBOX}
      DOUYIN_CONNECT_TIMEOUT: ${DOUYIN_CONNECT_TIMEOUT:-3s}
      DOUYIN_READ_TIMEOUT: ${DOUYIN_READ_TIMEOUT:-5s}
      DOUYIN_TEST_ENABLED: ${DOUYIN_TEST_ENABLED}
      DOUYIN_REAL_UPSTREAM_MODE: ${DOUYIN_REAL_UPSTREAM_MODE}
      DOUYIN_TOKEN_REFRESH_THRESHOLD_SECONDS: ${DOUYIN_TOKEN_REFRESH_THRESHOLD_SECONDS}
      DOUYIN_TOKEN_REDIS_LOCK_MINUTES: ${DOUYIN_TOKEN_REDIS_LOCK_MINUTES}
      DOUYIN_TOKEN_AUTO_REFRESH_ENABLED: ${DOUYIN_TOKEN_AUTO_REFRESH_ENABLED}
      DOUYIN_TOKEN_AUTO_REFRESH_CRON: ${DOUYIN_TOKEN_AUTO_REFRESH_CRON}
      DOUYIN_WEBHOOK_VERIFY_SIGN: ${DOUYIN_WEBHOOK_VERIFY_SIGN}
      ORDER_SYNC_ENABLED: ${ORDER_SYNC_ENABLED}
      TALENT_ENRICH_MODE: ${TALENT_ENRICH_MODE}
      TALENT_PUBLIC_PAGE_CRAWL_ENABLED: ${TALENT_PUBLIC_PAGE_CRAWL_ENABLED}
      APP_TEST_ENABLED: ${APP_TEST_ENABLED:-true}
      DEBUG: "false"
      SPRING_DEVTOOLS_ADD_PROPERTIES: "false"
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_CLIENT_RESTTEMPLATE: "INFO"
      LOGGING_LEVEL_COM_DOUDIAN_OPEN_CORE: "WARN"
      JAVA_OPTS: -Dspring.devtools.restart.enabled=false -Xdebug -Xrunjdwp:server=y,transport=dt_socket,address=*:5005,suspend=n
    volumes:
      - ./backend:/app
      - maven_cache_real_pre:/root/.m2
    depends_on:
      postgres-real-pre:
        condition: service_healthy
      redis-real-pre:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: on-failure

  frontend-real-pre:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    environment:
      VITE_PROXY_TARGET: http://backend-real-pre:8080
      VITE_API_BASE_URL: http://localhost:8081/api
      VITE_ENV_LABEL: REAL-PRE
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./frontend:/app
      - frontend_real_pre_node_modules:/app/node_modules
    depends_on:
      backend-real-pre:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_real_pre_data:
  redis_real_pre_data:
  maven_cache_real_pre:
  frontend_real_pre_node_modules:
