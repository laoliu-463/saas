name: saas-active
services:
  postgres:
    image: postgres:15-alpine
    container_name: saas-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/src/main/resources/db/alter-sys-dept.sql:/docker-entrypoint-initdb.d/02-alter-sys-dept.sql
      - ./backend/src/main/resources/db/alter-menu-permission-model.sql:/docker-entrypoint-initdb.d/03-alter-menu-permission-model.sql
      - ./backend/src/main/resources/db/alter-product-main-chain.sql:/docker-entrypoint-initdb.d/04-alter-product-main-chain.sql
      - ./backend/src/main/resources/db/alter-product-biz-status.sql:/docker-entrypoint-initdb.d/05-alter-product-biz-status.sql
      - ./backend/src/main/resources/db/alter-product-following.sql:/docker-entrypoint-initdb.d/06-alter-product-following.sql
      - ./backend/src/main/resources/db/alter-talent-enrich.sql:/docker-entrypoint-initdb.d/07-alter-talent-enrich.sql
      - ./backend/src/main/resources/db/alter-talent-crm-gap-fill.sql:/docker-entrypoint-initdb.d/08-alter-talent-crm-gap-fill.sql
      - ./backend/src/main/resources/db/alter-product-extended-columns.sql:/docker-entrypoint-initdb.d/09-alter-product-extended-columns.sql
      - ./backend/src/main/resources/db/alter-order-attribution-mvp.sql:/docker-entrypoint-initdb.d/10-alter-order-attribution-mvp.sql
      - ./backend/src/main/resources/db/alter-order-attribution-mvp-v2.sql:/docker-entrypoint-initdb.d/11-alter-order-attribution-mvp-v2.sql
      - ./backend/src/main/resources/db/alter-order-pick-source-length.sql:/docker-entrypoint-initdb.d/12-alter-order-pick-source-length.sql
      - ./backend/src/main/resources/db/alter-pick-source-mapping-colonel-buyin-id.sql:/docker-entrypoint-initdb.d/13-alter-pick-source-mapping-colonel-buyin-id.sql
      - ./backend/src/main/resources/db/alter-pick-source-mapping-duplicate-pick-source.sql:/docker-entrypoint-initdb.d/14-alter-pick-source-mapping-duplicate-pick-source.sql
      - ./backend/src/main/resources/db/alter-pick-source-mapping-native-source-type.sql:/docker-entrypoint-initdb.d/15-alter-pick-source-mapping-native-source-type.sql
      - ./backend/src/main/resources/db/alter-pick-source-mapping-pick-extra-length.sql:/docker-entrypoint-initdb.d/16-alter-pick-source-mapping-pick-extra-length.sql
      - ./backend/src/main/resources/db/alter-order-talent-id.sql:/docker-entrypoint-initdb.d/17-alter-order-talent-id.sql
      - ./backend/src/main/resources/db/alter-merchant-owner-columns.sql:/docker-entrypoint-initdb.d/18-alter-merchant-owner-columns.sql
      - ./backend/src/main/resources/db/alter-merchant-ownership.sql:/docker-entrypoint-initdb.d/19-alter-merchant-ownership.sql
      - ./backend/src/main/resources/db/alter-cso-sample-attribution-indexes.sql:/docker-entrypoint-initdb.d/20-alter-cso-sample-attribution-indexes.sql
      - ./backend/src/main/resources/db/alter-partitioned-order-log-pk-default.sql:/docker-entrypoint-initdb.d/21-alter-partitioned-order-log-pk-default.sql
      - ./backend/src/main/resources/db/alter-sample-shipper-code.sql:/docker-entrypoint-initdb.d/22-alter-sample-shipper-code.sql
      - ./backend/src/main/resources/db/backfill-pick-source-mapping-colonel-buyin-id.sql:/docker-entrypoint-initdb.d/23-backfill-pick-source-mapping-colonel-buyin-id.sql
      - ./backend/src/main/resources/db/backfill-pick-source-mapping-from-promotion-link.sql:/docker-entrypoint-initdb.d/24-backfill-pick-source-mapping-from-promotion-link.sql
      - ./backend/src/main/resources/db/backfill-order-attribution-colonel-reasons.sql:/docker-entrypoint-initdb.d/25-backfill-order-attribution-colonel-reasons.sql
      - ./backend/src/main/resources/db/seed-colonel-buyin-mappings.sql:/docker-entrypoint-initdb.d/26-seed-colonel-buyin-mappings.sql
      - ./backend/src/main/resources/db/create-douyin-webhook-event.sql:/docker-entrypoint-initdb.d/27-create-douyin-webhook-event.sql
      - ./backend/src/main/resources/db/create-order-sync-dedup-claim.sql:/docker-entrypoint-initdb.d/28-create-order-sync-dedup-claim.sql
      - ./backend/src/main/resources/db/alter-test-existing-volumes-20260504.sql:/docker-entrypoint-initdb.d/29-alter-test-existing-volumes-20260504.sql
      - ./backend/src/main/resources/db/create-colonel-order-settlement.sql:/docker-entrypoint-initdb.d/30-create-colonel-order-settlement.sql
      - ./backend/src/main/resources/db/alter-colonel-activity-product-state-split.sql:/docker-entrypoint-initdb.d/31-alter-colonel-activity-product-state-split.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: saas-backend
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
      - "${BACKEND_DEBUG_HOST_PORT:-5005}:5005"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      APP_ENV_LABEL: ${APP_ENV_LABEL:-}
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DATABASE: ${REDIS_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      DOUYIN_BASE_URL: ${DOUYIN_BASE_URL}
      DOUYIN_APP_ID: ${DOUYIN_APP_ID:-}
      DOUYIN_CLIENT_KEY: ${DOUYIN_CLIENT_KEY:-}
      DOUYIN_CLIENT_SECRET: ${DOUYIN_CLIENT_SECRET:-}
      DOUYIN_SANDBOX: ${DOUYIN_SANDBOX:-false}
      DOUYIN_CONNECT_TIMEOUT: ${DOUYIN_CONNECT_TIMEOUT:-3s}
      DOUYIN_READ_TIMEOUT: ${DOUYIN_READ_TIMEOUT:-5s}
      DOUYIN_TEST_ENABLED: ${DOUYIN_TEST_ENABLED}
      DOUYIN_REAL_UPSTREAM_MODE: ${DOUYIN_REAL_UPSTREAM_MODE:-live}
      DOUYIN_TOKEN_REFRESH_THRESHOLD_SECONDS: ${DOUYIN_TOKEN_REFRESH_THRESHOLD_SECONDS:-300}
      DOUYIN_TOKEN_REDIS_LOCK_MINUTES: ${DOUYIN_TOKEN_REDIS_LOCK_MINUTES:-5}
      DOUYIN_TOKEN_AUTO_REFRESH_ENABLED: ${DOUYIN_TOKEN_AUTO_REFRESH_ENABLED:-false}
      DOUYIN_TOKEN_AUTO_REFRESH_CRON: ${DOUYIN_TOKEN_AUTO_REFRESH_CRON:-0 */10 * * * ?}
      DOUYIN_WEBHOOK_VERIFY_SIGN: ${DOUYIN_WEBHOOK_VERIFY_SIGN:-true}
      ORDER_SYNC_ENABLED: ${ORDER_SYNC_ENABLED:-false}
      APP_TEST_ENABLED: ${APP_TEST_ENABLED}
      APP_TEST_SEED_ON_STARTUP: ${APP_TEST_SEED_ON_STARTUP:-false}
      APP_TEST_DOUYIN_ENABLED: ${APP_TEST_DOUYIN_ENABLED:-false}
      APP_TEST_PROMOTION_ENABLED: ${APP_TEST_PROMOTION_ENABLED:-false}
      APP_TEST_ORDER_ENABLED: ${APP_TEST_ORDER_ENABLED:-false}
      APP_TEST_TALENT_ENABLED: ${APP_TEST_TALENT_ENABLED:-false}
      APP_TEST_LOGISTICS_ENABLED: ${APP_TEST_LOGISTICS_ENABLED:-false}
      TALENT_ENRICH_MODE: ${TALENT_ENRICH_MODE:-test}
      TALENT_PUBLIC_PAGE_CRAWL_ENABLED: ${TALENT_PUBLIC_PAGE_CRAWL_ENABLED:-false}
      CRAWLER_TALENT_URL: ${CRAWLER_TALENT_URL:-https://api.douyin.com/internal/talent/list}
      KDNIAO_ENABLED: ${KDNIAO_ENABLED:-false}
      KDNIAO_REQUEST_URL: ${KDNIAO_REQUEST_URL:-}
      KDNIAO_EBUSINESS_ID: ${KDNIAO_EBUSINESS_ID:-}
      KDNIAO_APP_KEY: ${KDNIAO_APP_KEY:-}
      KDNIAO_SANDBOX: ${KDNIAO_SANDBOX:-false}
      DEBUG: "false"
      SPRING_DEVTOOLS_ADD_PROPERTIES: "false"
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_CLIENT_RESTTEMPLATE: ${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB_CLIENT_RESTTEMPLATE:-INFO}
      LOGGING_LEVEL_COM_DOUDIAN_OPEN_CORE: ${LOGGING_LEVEL_COM_DOUDIAN_OPEN_CORE:-WARN}
      JAVA_OPTS: ${JAVA_OPTS:--Dspring.devtools.restart.enabled=false -Xdebug -Xrunjdwp:server=y,transport=dt_socket,address=*:5005,suspend=n}
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- -T 5 -t 1 http://127.0.0.1:8080/api/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: saas-frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    environment:
      VITE_PROXY_TARGET: http://backend:8080
      VITE_API_BASE_URL: /api
      VITE_ENV_LABEL: ${VITE_ENV_LABEL}
      VITE_DEV_PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-1000}
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    restart: on-failure

volumes:
  postgres_data:
    name: saas_${SAAS_ENV_SLUG}_postgres_data
  redis_data:
    name: saas_${SAAS_ENV_SLUG}_redis_data
  maven_cache:
    name: saas_active_maven_cache
  frontend_node_modules:
    name: saas_${SAAS_ENV_SLUG}_frontend_node_modules
