services:
  postgres:
    image: postgres:15-alpine
    container_name: colonel-postgres
    environment:
      POSTGRES_DB: colonel_saas
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-saas123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d colonel_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  redis:
    image: redis:7-alpine
    container_name: colonel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: colonel-backend
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: colonel_saas
      DB_USER: saas
      DB_PASSWORD: ${DB_PASSWORD:-saas123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-colonel-saas-jwt-secret-key-at-least-32-chars}
      DOUYIN_BASE_URL: ${DOUYIN_BASE_URL:-https://openapi-fxg.jinritemai.com}
      DOUYIN_APP_ID: ${DOUYIN_APP_ID:-}
      DOUYIN_CLIENT_KEY: ${DOUYIN_CLIENT_KEY:-}
      DOUYIN_CLIENT_SECRET: ${DOUYIN_CLIENT_SECRET:-}
      DOUYIN_SANDBOX: ${DOUYIN_SANDBOX:-false}
      DOUYIN_TOKEN_REFRESH_THRESHOLD_SECONDS: ${DOUYIN_TOKEN_REFRESH_THRESHOLD_SECONDS:-300}
      DOUYIN_TOKEN_REDIS_LOCK_MINUTES: ${DOUYIN_TOKEN_REDIS_LOCK_MINUTES:-5}
      CRAWLER_TALENT_URL: ${CRAWLER_TALENT_URL:-https://api.douyin.com/internal/talent/list}
      JAVA_OPTS: -Dspring.devtools.restart.enabled=false -Xdebug -Xrunjdwp:server=y,transport=dt_socket,address=*:5005,suspend=n
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/api/sys/users/page?page=1&size=1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: colonel-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_PROXY_TARGET: http://backend:8080
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  maven_cache:
  frontend_node_modules:
